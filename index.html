<!doctype html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>CampusConnect | Academic Administration</title>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='styles.profile.css'>
  <script src='script.js' defer></script>
</head>
<body>
  <div class='app-shell'>
    <aside class='sidebar' id='sidebar'>
      <a class='brand' href='#dashboard'><b>CC</b><span><strong>Campus</strong>Connect<small>Academic administration</small></span></a>
      <nav id='navigation' class='navigation' aria-label='Main navigation'></nav>
      <div class='sidebar-bottom'><span class='online-dot'></span> System online</div>
    </aside>
    <main class='workspace'>
      <header class='topbar'>
        <button id='menu-button' class='icon-button mobile-only' aria-label='Open navigation'>☰</button>
        <label class='global-search'><span>⌕</span><input id='global-search' placeholder='Search students, subjects, or classes...' autocomplete='off'></label>
        <div class='top-actions'>
          <button id='theme-toggle' class='icon-button' aria-label='Toggle dark mode'>◐</button>
          <button id='refresh-button' class='icon-button' aria-label='Refresh data'>↻</button>
          <details class='profile'><summary><span>AM</span><i>Alex Morgan</i></summary><div><b>School Administrator</b><small>Junior Secondary (Grades 7–9)</small></div></details>
        </div>
      </header>
      <div id='toast-region' class='toast-region' aria-live='polite'></div>
      <div id='page-root'></div>
    </main>
  </div>
  <div id='modal-root'></div>
</body>
</html>
