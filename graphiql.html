<!doctype html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>CampusConnect GraphiQL</title>
  <link rel='stylesheet' href='//unpkg.com/graphiql/graphiql.min.css'>
  <style>html,body,[id=graphiql]{height:100%;margin:0}</style>
</head>
<body>
  <div id='graphiql'>Loading GraphiQL...</div>
  <script crossorigin src='//unpkg.com/react@18/umd/react.production.min.js'></script>
  <script crossorigin src='//unpkg.com/react-dom@18/umd/react-dom.production.min.js'></script>
  <script src='//unpkg.com/graphiql/graphiql.min.js'></script>
  <script>const fetcher=GraphiQL.createFetcher({url:'/graphql'});ReactDOM.createRoot(document.getElementById('graphiql')).render(React.createElement(GraphiQL,{fetcher}));</script>
</body>
</html>
